---
deployment:
  tasks:
    - echo "Manual Rust installation attempt..." > $HOME/rust_setup.log 2>&1
    - cd $HOME
    - curl -sSf https://static.rust-lang.org/rustup/dist/x86_64-unknown-linux-gnu/rustup-init -o rustup-init >> $HOME/rust_setup.log 2>&1
    - ls -la rustup-init >> $HOME/rust_setup.log 2>&1
    - chmod +x rustup-init >> $HOME/rust_setup.log 2>&1
    - file rustup-init >> $HOME/rust_setup.log 2>&1
    - ./rustup-init -y --no-modify-path >> $HOME/rust_setup.log 2>&1
    - echo "Installation attempt completed" >> $HOME/rust_setup.log 2>&1
